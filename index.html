<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام شركة اتوبيسي - العاصمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .luxury-3d {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: perspective(1000px) rotateX(2deg);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .luxury-3d:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.02);
            box-shadow: 0 35px 60px -15px rgba(30, 64, 175, 0.2);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #020617 0%, #1e40af 100%);
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e40af; border-radius: 20px; border: 2px solid #f8fafc; }
        .nav-active { @apply bg-white/20 shadow-xl border-r-4 border-yellow-400; }
        
        /* New Luxury Touches */
        .neon-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .tilt-card {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .text-gradient {
            background: linear-gradient(to right, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen custom-scrollbar selection:bg-blue-100 selection:text-blue-900" x-data="systemState()">

    <!-- Login Screen -->
    <template x-if="!isLoggedIn">
        <div class="flex items-center justify-center min-h-screen gradient-bg p-6 overflow-hidden relative">
            <div class="absolute inset-0 opacity-30 pointer-events-none">
                <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-blue-500 rounded-full mix-blend-screen filter blur-[120px] animate-blob"></div>
                <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-indigo-500 rounded-full mix-blend-screen filter blur-[120px] animate-blob animation-delay-2000"></div>
            </div>
            
            <div class="bg-white/95 backdrop-blur-2xl p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate__animated animate__fadeInUp luxury-3d border border-white/40 z-10">
                <div class="text-center mb-12">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-tr from-blue-700 to-blue-500 rounded-[2rem] mb-8 shadow-2xl shadow-blue-300 transform -rotate-6">
                        <i class="fas fa-bus-simple text-5xl text-white"></i>
                    </div>
                    <h1 class="text-5xl font-black text-slate-900 mb-3 tracking-tight">اتوبيسي</h1>
                    <div class="flex items-center justify-center space-x-2 space-x-reverse">
                        <span class="h-0.5 w-8 bg-blue-600 rounded-full"></span>
                        <p class="text-blue-700 font-black uppercase tracking-[0.2em] text-sm">العاصمة</p>
                        <span class="h-0.5 w-8 bg-blue-600 rounded-full"></span>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="space-y-3">
                        <label class="block text-slate-800 font-black mr-2 text-xs uppercase tracking-widest">اسم المستخدم</label>
                        <div class="relative group">
                            <input type="text" x-model="loginForm.username" @keyup.enter="login()" class="w-full px-8 py-6 pr-16 rounded-3xl bg-slate-50 border-2 border-slate-100 focus:border-blue-600 focus:bg-white focus:ring-0 outline-none transition-all font-black text-slate-800 text-lg shadow-sm" placeholder="Admin / Employee">
                            <i class="fas fa-user-tie absolute right-7 top-7 text-slate-300 group-focus-within:text-blue-600 transition text-xl"></i>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-slate-800 font-black mr-2 text-xs uppercase tracking-widest">كلمة المرور</label>
                        <div class="relative group">
                            <input type="password" x-model="loginForm.password" @keyup.enter="login()" class="w-full px-8 py-6 pr-16 rounded-3xl bg-slate-50 border-2 border-slate-100 focus:border-blue-600 focus:bg-white focus:ring-0 outline-none transition-all font-black text-slate-800 text-lg shadow-sm" placeholder="••••••••">
                            <i class="fas fa-key-skeleton absolute right-7 top-7 text-slate-300 group-focus-within:text-blue-600 transition text-xl"></i>
                        </div>
                    </div>
                    <button @click="login()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black hover:bg-blue-700 transition-all duration-300 shadow-2xl shadow-blue-200 text-2xl transform hover:-translate-y-1 active:scale-95 flex items-center justify-center">
                        <span>دخول النظام</span>
                        <i class="fas fa-arrow-left mr-3 text-sm opacity-50"></i>
                    </button>
                    
                    <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                        <a href="#" @click.prevent="forgotPassword()" class="text-blue-700 font-black text-sm hover:underline decoration-2 underline-offset-4">نسيت كلمة السر؟</a>
                        <span class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-tighter">Powered by OTOBeesy Tech</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Main Dashboard -->
    <template x-if="isLoggedIn">
        <div class="flex flex-col md:flex-row min-h-screen overflow-hidden">
            <!-- Sidebar -->
            <div class="w-full md:w-80 gradient-bg text-white p-10 shadow-2xl z-20 flex flex-col relative overflow-hidden">
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl"></div>
                <div class="flex items-center mb-16 relative z-10">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-2xl shadow-white/20 transform -rotate-12 ml-4">
                        <i class="fas fa-bus-simple text-blue-900 text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-black tracking-tighter italic uppercase">Otobeesy</h2>
                </div>
                
                <nav class="space-y-4 flex-1 overflow-y-auto custom-scrollbar pr-2 relative z-10">
                    <template x-for="(label, key) in sectionTitles">
                        <button @click="currentSection = key" 
                                :class="currentSection === key ? 'bg-white/10 shadow-xl border-r-4 border-yellow-400' : 'hover:bg-white/5 border-r-4 border-transparent'" 
                                class="w-full flex items-center p-5 rounded-2xl transition-all group duration-300">
                            <i :class="sectionIcons[key]" class="ml-4 w-7 text-xl group-hover:scale-125 transition duration-500"></i>
                            <span class="font-black text-lg tracking-tight" x-text="label"></span>
                        </button>
                    </template>
                </nav>
                
                <div class="pt-10 border-t border-white/10 mt-10 space-y-5 relative z-10">
                    <div class="flex items-center px-5 py-4 bg-white/5 rounded-3xl backdrop-blur-xl border border-white/10 shadow-lg">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center text-white font-black ml-4 shadow-2xl ring-4 ring-white/10">
                            <span x-text="loginForm.username.charAt(0).toUpperCase()"></span>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black truncate w-32 tracking-tighter" x-text="loginForm.username"></p>
                            <p class="text-[10px] text-blue-300 font-black uppercase tracking-[0.2em] mt-1" x-text="userRole"></p>
                        </div>
                    </div>
                    <button @click="logout()" class="w-full flex items-center justify-center p-5 rounded-3xl bg-red-600/10 hover:bg-red-600 transition-all duration-300 text-red-400 hover:text-white font-black shadow-lg">
                        <i class="fas fa-power-off ml-4 text-xl"></i>
                        <span class="text-lg">خروج</span>
                    </button>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="flex-1 bg-slate-50 overflow-y-auto custom-scrollbar selection:bg-blue-600 selection:text-white">
                <header class="bg-white/90 backdrop-blur-2xl border-b px-12 py-10 sticky top-0 z-10 flex flex-col xl:flex-row justify-between items-center gap-8 shadow-sm">
                    <div class="flex items-center">
                        <div class="w-3 h-12 bg-blue-700 ml-6 rounded-full shadow-2xl shadow-blue-300"></div>
                        <div class="flex flex-col">
                            <h2 class="text-4xl font-black text-slate-900 tracking-tighter" x-text="sectionTitles[currentSection]"></h2>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1" x-text="'System Time: ' + currentTime"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="hidden xl:flex items-center gap-4 bg-slate-100 px-8 py-4 rounded-[2rem] border border-slate-200 shadow-inner">
                            <i class="fas fa-clock text-blue-600 text-xl"></i>
                            <span class="font-black text-slate-800 text-2xl tracking-tighter" x-text="currentTime"></span>
                        </div>
                        <div class="relative w-full xl:w-[450px] group">
                            <input type="text" x-model="globalSearch" placeholder="بحث ذكي عن أي معلومة..." class="w-full pr-16 pl-8 py-5 rounded-[2rem] bg-slate-100 border-none focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none font-black text-slate-800 transition-all text-xl shadow-inner group-hover:shadow-lg">
                            <i class="fas fa-magnifying-glass absolute right-6 top-6 text-slate-400 text-2xl group-focus-within:text-blue-700 transition"></i>
                        </div>
                    </div>
                </header>

                <main class="p-12 max-w-[1600px] mx-auto">
                    <!-- Dynamic Dashboard Summary -->
                    <div x-show="currentSection === 'kb' && !globalSearch" class="mb-16 animate__animated animate__fadeInDown">
                        <div class="bg-slate-900 p-16 rounded-[4.5rem] text-white relative overflow-hidden shadow-2xl luxury-3d border border-white/10 group">
                            <div class="absolute inset-0 bg-gradient-to-br from-blue-900/50 to-transparent opacity-50 group-hover:opacity-100 transition duration-1000"></div>
                            <div class="absolute -right-20 -top-20 w-96 h-96 bg-blue-600/10 rounded-full blur-[100px] group-hover:scale-150 transition duration-1000"></div>
                            
                            <div class="relative z-10">
                                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8">
                                    <div>
                                        <h3 class="text-4xl font-black mb-4 tracking-tighter">أهلاً بك في نظام <span class="text-blue-500">OTOBeesy</span></h3>
                                        <p class="text-slate-400 font-bold text-xl max-w-2xl leading-relaxed" x-text="typingMessage"></p>
                                    </div>
                                    <div class="bg-white/5 backdrop-blur-xl p-8 rounded-[3rem] border border-white/10 text-center min-w-[200px] shadow-2xl">
                                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400 mb-2">Service Status</p>
                                        <div class="flex items-center justify-center gap-3">
                                            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_15px_rgba(34,197,94,0.8)]"></div>
                                            <span class="text-2xl font-black tracking-widest">ONLINE</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 lg:grid-cols-4 gap-8">
                                    <template x-for="stat in dashboardStats">
                                        <div class="p-8 bg-white/5 rounded-[3rem] backdrop-blur-md border border-white/10 hover:bg-white/10 transition-all duration-500 group/stat">
                                            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl group-hover/stat:rotate-12 transition">
                                                <i :class="stat.icon" class="text-2xl"></i>
                                            </div>
                                            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2" x-text="stat.label"></p>
                                            <p class="text-4xl font-black tracking-tighter" x-text="stat.value"></p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- KB Section -->
                    <div x-show="currentSection === 'kb'" class="space-y-12 animate__animated animate__fadeIn">
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                            <template x-for="item in kbData.filter(i => i.name.includes(globalSearch) || i.code.includes(globalSearch))">
                                <div @mousemove="tiltCard($event)" @mouseleave="resetTilt($event)" class="bg-white p-10 rounded-[3.5rem] shadow-sm hover:shadow-2xl transition-all duration-700 luxury-3d border border-slate-100 group relative overflow-hidden tilt-card">
                                    <div class="absolute -right-16 -top-16 w-48 h-48 bg-blue-50 rounded-full opacity-0 group-hover:opacity-100 group-hover:scale-150 transition-all duration-1000"></div>
                                    <div class="relative z-10">
                                        <div class="flex items-center justify-between mb-10">
                                            <div class="w-20 h-20 bg-gradient-to-br from-blue-700 to-blue-500 rounded-3xl flex items-center justify-center text-white shadow-2xl shadow-blue-200 group-hover:rotate-12 transition duration-500">
                                                <i class="fas fa-building-circle-check text-3xl"></i>
                                            </div>
                                            <div class="text-left">
                                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] block mb-1">Office Code</span>
                                                <span class="text-lg font-black bg-slate-100 text-blue-700 px-5 py-2 rounded-2xl border border-blue-50" x-text="item.code"></span>
                                            </div>
                                        </div>
                                        <h3 class="text-3xl font-black text-slate-900 mb-6 group-hover:text-blue-700 transition" x-text="item.name"></h3>
                                        <div class="space-y-5 mb-12">
                                            <div class="flex items-start">
                                                <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center ml-4 flex-shrink-0 group-hover:bg-blue-50 transition">
                                                    <i class="fas fa-map-location text-blue-500"></i>
                                                </div>
                                                <p class="text-slate-500 font-bold text-sm leading-relaxed" x-text="item.address"></p>
                                            </div>
                                            <div class="flex items-center text-sm font-bold text-slate-700">
                                                <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center ml-4 flex-shrink-0 group-hover:bg-blue-50 transition">
                                                    <i class="fas fa-headset text-blue-500"></i>
                                                </div>
                                                <span x-text="item.phone"></span>
                                            </div>
                                        </div>
                                        <button @click="showKBDetail(item)" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-blue-700 transition-all shadow-2xl active:scale-95 flex items-center justify-center">
                                            <span>عرض التفاصيل واللوكيشن</span>
                                            <i class="fas fa-chevron-left mr-3 text-xs opacity-50"></i>
                                        </button>
                                        <div x-show="userRole === 'CHIEF ADMINISTRATOR'" class="flex gap-3 mt-4">
                                            <button @click="editKB(item)" class="flex-1 bg-blue-100 text-blue-700 py-3 rounded-2xl font-black text-sm hover:bg-blue-200 transition">تعديل</button>
                                            <button @click="deleteKB(item)" class="flex-1 bg-red-100 text-red-600 py-3 rounded-2xl font-black text-sm hover:bg-red-200 transition">حذف</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            
                            <!-- Admin Add Office Card -->
                            <div x-show="userRole === 'CHIEF ADMINISTRATOR'" 
                                 @click="addKB()"
                                 class="bg-blue-50/30 border-4 border-dashed border-blue-200 rounded-[3.5rem] flex flex-col items-center justify-center p-10 group cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all duration-500 luxury-3d">
                                <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mb-6 group-hover:scale-110 group-hover:bg-blue-600 group-hover:text-white transition-all duration-500 shadow-xl">
                                    <i class="fas fa-plus text-4xl"></i>
                                </div>
                                <span class="text-xl font-black text-blue-700 uppercase tracking-widest">إضافة مكتب جديد</span>
                                <p class="text-blue-400 font-bold mt-2 text-sm">سيظهر المكتب فوراً في النظام</p>
                            </div>
                        </div>
                    </div>

                    <!-- Shipping Section -->
                    <div x-show="currentSection === 'shipping'" class="space-y-12 animate__animated animate__fadeIn">
                        <div class="bg-white p-16 rounded-[4rem] shadow-2xl luxury-3d border border-slate-100 relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-3 bg-blue-700"></div>
                            <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-50 rounded-full blur-3xl opacity-50 group-hover:scale-150 transition duration-1000"></div>
                            <div class="relative z-10">
                                <h3 class="text-5xl font-black text-slate-900 mb-12 tracking-tighter">تتبع الشحنات والطرود</h3>
                                <div class="flex flex-col lg:flex-row gap-10">
                                    <div class="flex-1 relative group/input">
                                        <input type="text" x-model="shippingSearch" placeholder="أدخل رقم البوليصة المكون من 6 أرقام..." class="w-full px-12 py-8 rounded-[2.5rem] bg-slate-50 border-4 border-slate-100 focus:border-blue-600 focus:bg-white focus:ring-0 outline-none font-black text-3xl transition-all shadow-inner">
                                        <i class="fas fa-barcode absolute left-10 top-9 text-slate-300 group-focus-within/input:text-blue-600 transition text-3xl"></i>
                                    </div>
                                    <button @click="trackShipment()" class="bg-blue-700 text-white px-20 py-8 rounded-[2.5rem] font-black text-3xl hover:bg-blue-800 transition-all shadow-2xl shadow-blue-300 active:scale-95 flex items-center justify-center">
                                        <i class="fas fa-magnifying-glass ml-4"></i>
                                        <span>تتبع الآن</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            <div class="lg:col-span-2 bg-white p-12 rounded-[3.5rem] shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-10">
                                    <h4 class="text-3xl font-black text-slate-900 flex items-center">
                                        <i class="fas fa-money-check-dollar ml-5 text-blue-700"></i>
                                        تعريفة الشحن والخدمات
                                    </h4>
                                    <button class="bg-slate-100 text-slate-500 px-6 py-2 rounded-full font-black text-xs uppercase tracking-widest hover:bg-blue-100 hover:text-blue-700 transition">Update Price List</button>
                                </div>
                                <div class="overflow-x-auto custom-scrollbar">
                                    <table class="w-full text-right border-collapse min-w-[600px]">
                                        <thead>
                                            <tr class="text-slate-400 font-black text-xs uppercase tracking-[0.2em] border-b-2 border-slate-50">
                                                <th class="p-6">Category</th>
                                                <th class="p-6">Est. Price</th>
                                                <th class="p-6">Availability</th>
                                                <th class="p-6 text-left">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody class="font-bold text-slate-800 text-lg">
                                            <template x-for="ship in shippingRates">
                                                <tr class="border-b border-slate-50 hover:bg-blue-50/50 transition duration-300">
                                                    <td class="p-6">
                                                        <div class="flex items-center">
                                                            <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center ml-4"><i :class="ship.icon" class="text-blue-600"></i></div>
                                                            <span x-text="ship.type"></span>
                                                        </div>
                                                    </td>
                                                    <td class="p-6 text-blue-700 font-black" x-text="ship.price"></td>
                                                    <td class="p-6">
                                                        <span :class="ship.status === 'مسموح' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" class="px-4 py-1.5 rounded-2xl text-xs font-black" x-text="ship.status"></span>
                                                    </td>
                                                    <td class="p-6 text-left">
                                                        <button class="text-slate-300 hover:text-blue-700 transition"><i class="fas fa-ellipsis-v"></i></button>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="bg-slate-950 p-12 rounded-[3.5rem] shadow-2xl text-white relative overflow-hidden group">
                                <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/20 rounded-full blur-[80px] group-hover:scale-150 transition duration-1000"></div>
                                <h4 class="text-3xl font-black mb-10 flex items-center">
                                    <i class="fas fa-shield-halved ml-4 text-yellow-400"></i>
                                    قائمة الممنوعات
                                </h4>
                                <div class="space-y-6">
                                    <template x-for="item in prohibitedItems">
                                        <div class="flex items-center p-5 bg-white/5 rounded-3xl border border-white/10 hover:bg-white/10 transition group/item">
                                            <div class="w-12 h-12 bg-red-600/20 text-red-500 rounded-2xl flex items-center justify-center ml-5 group-hover/item:scale-110 transition">
                                                <i class="fas fa-xmark text-xl"></i>
                                            </div>
                                            <span class="text-lg font-black opacity-80" x-text="item"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bus Section -->
                    <div x-show="currentSection === 'buses'" class="space-y-12 animate__animated animate__fadeIn">
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-12">
